<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLUTCH OR KICK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=JetBrains+Mono:wght@800&display=swap');

        body {
            background: #050505;
            color: #ff3e3e;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            margin: 0;
        }

        .glitch { text-shadow: 2px 0 #00f2ff, -2px 0 #ff004c; animation: glitch-anim 0.2s infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        .target {
            position: absolute;
            width: 70px;
            height: 70px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .flash-white {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div id="startScreen" class="text-center z-10 p-6">
        <h1 class="text-5xl font-black mb-4 glitch italic uppercase" style="font-family: 'Black Ops One';">Clutch or Kick</h1>
        <p class="text-[10px] text-white opacity-50 mb-10 uppercase tracking-[0.3em]">Stress Test v1.0 // Almaty Sector</p>
        <button onclick="startTest()" class="border-2 border-red-600 px-10 py-4 text-red-600 font-black active:bg-red-600 active:text-white transition-all uppercase">
            Вступить в клатч
        </button>
    </div>

    <div id="gameScreen" class="hidden w-full h-full relative">
        <div id="timer" class="absolute top-12 left-1/2 -translate-x-1/2 text-6xl font-black italic opacity-20">15</div>
        <div id="shout" class="absolute w-full text-center top-1/4 text-2xl font-black text-white/80 uppercase pointer-events-none px-4"></div>
    </div>

    <div id="resultScreen" class="hidden text-center z-10 p-6">
        <h2 class="text-[10px] uppercase text-white opacity-50 mb-2 tracking-widest">Анализ завершен:</h2>
        <div id="verdictTitle" class="text-4xl font-black mb-4 uppercase glitch italic"></div>
        <p id="verdictDesc" class="text-sm text-gray-400 mb-10 italic max-w-xs mx-auto"></p>
        <button onclick="location.reload()" class="border border-white/20 px-6 py-2 text-[10px] text-white uppercase font-bold">Рестарт</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 15;
        let gameActive = false;
        
        const shouts = ["ОН НА ШОРТЕ!!", "ДАЙ АВИК!!", "ЧТО ТЫ ДЕЛАЕШЬ?!", "В КРЫСУ ИДЕТ!!", "ФЛЕШКУ КИНЬ!", "МИД ЧЕКАЙ!", "ГДЕ ИНФА?!"];
        
        // Массив ссылок на звуки для надежности (выстрел и флешка)
        const shotUrl = 'https://www.soundjay.com/buttons/sounds/button-20.mp3';
        const flashUrl = 'https://www.myinstants.com/media/sounds/csgo-flashbang-sound-effect.mp3';

        function startTest() {
            // 1. Сразу убираем экран и ставим флаг
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.body.classList.add('shaking');
            gameActive = true;

            // 2. Тестовый прогон звука для разблокировки браузера
            const testAudio = new Audio(shotUrl);
            testAudio.volume = 0.01;
            testAudio.play().catch(e => console.log("Audio waiting for interaction"));

            // 3. Запуск таймера
            const gameInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(gameInterval);
                    return;
                }
                
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                if (timeLeft % 2 === 0) {
                    document.getElementById('shout').innerText = shouts[Math.floor(Math.random() * shouts.length)];
                }

                if (timeLeft <= 0) {
                    gameActive = false;
                    showResult();
                }
            }, 1000);

            // 4. Первая цель
            spawnTarget();
        }

        function spawnTarget() {
            if (!gameActive) return;

            const gameScreen = document.getElementById('gameScreen');
            const isFlash = Math.random() > 0.8; // 20% шанс флешки
            const target = document.createElement('div');
            target.className = 'target';
            
            // Отрисовка SVG (Прицел или Граната)
            target.innerHTML = isFlash 
                ? `<svg viewBox="0 0 24 24" class="w-12 h-12 fill-white"><path d="M12 2L9 5H5V9L2 12L5 15V19H9L12 22L15 19H19V15L22 12L19 9V5H15L12 2Z"/></svg>` 
                : `<svg viewBox="0 0 24 24" class="w-full h-full fill-red-600 drop-shadow-[0_0_8px_rgba(255,0,0,0.8)]"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4-9h-3V8c0-.55-.45-1-1-1s-1 .45-1 1v3H8c-.55 0-1 .45-1 1s.45 1 1 1h3v3c0 .55.45 1 1 1s1-.45 1-1v-3h3c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>`;
            
            target.style.top = (Math.random() * 60 + 20) + '%';
            target.style.left = (Math.random() * 60 + 20) + '%';
            
            target.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                // Звук выстрела (новый объект каждый раз для наложения звуков)
                const s = new Audio(shotUrl);
                s.volume = 0.5;
                s.play().catch(()=>{});
                
                if (!isFlash) score++;
                target.remove();
                spawnTarget();
            };
            
            gameScreen.appendChild(target);

            // Жизненный цикл цели
            setTimeout(() => {
                if (target.parentNode) {
                    if (isFlash && gameActive) triggerFlash();
                    target.remove();
                    spawnTarget();
                }
            }, isFlash ? 700 : 1300);
        }

        function triggerFlash() {
            const fS = new Audio(flashUrl);
            fS.play().catch(()=>{});
            
            const f = document.createElement('div');
            f.className = 'flash-white';
            document.body.appendChild(f);
            
            setTimeout(() => {
                f.style.transition = "opacity 1.5s";
                f.style.opacity = "0";
                setTimeout(() => f.remove(), 1500);
            }, 50);
        }

        function showResult() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.body.classList.remove('shaking');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            let title, desc;
            if (score < 5) { title = "Трясущиеся руки"; desc = "Ты не попал бы даже в лежачего тиммейта. Продай скины, купи успокоительное."; }
            else if (score < 12) { title = "Жертва байта"; desc = "Слишком много слушаешь криков. Твой прицел живет своей жизнью."; }
            else if (score < 20) { title = "Клатч-машина"; desc = "Мутнул всех и затащил. Братья в группе официально признают тебя батей."; }
            else { title = "S1MPLE MODE"; desc = "Ты видишь матрицу. Ливай из этой группы и иди в NAVI."; }

            document.getElementById('verdictTitle').innerText = title;
            document.getElementById('verdictDesc').innerText = desc;
        }
    </script>
</body>
</html>
